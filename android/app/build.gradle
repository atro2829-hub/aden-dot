apply plugin: 'com.android.application'

// ---------------------------------------------------------------------------
// Keystore signing configuration
// ---------------------------------------------------------------------------
// Priority:
//   1. Read from keystore.properties file (app/keystore/ or root keystore/)
//   2. Fall back to environment variables (CI/CD)
//   3. If KEYSTORE_BASE64 env var is set, decode it to a temp file
// ---------------------------------------------------------------------------

def keystoreProperties = new Properties()

// 1a. Try loading from app-level keystore.properties
def appKeystorePropertiesFile = rootProject.file("app/keystore/keystore.properties")
if (appKeystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(appKeystorePropertiesFile))
}

// 1b. Try loading from root-level keystore.properties (if app-level not found)
if (!keystoreProperties.containsKey('keyAlias')) {
    def rootKeystorePropertiesFile = rootProject.file("keystore/keystore.properties")
    if (rootKeystorePropertiesFile.exists()) {
        keystoreProperties.load(new FileInputStream(rootKeystorePropertiesFile))
        // Fix storeFile path - root keystore.properties references keystore/ relative to root
        // but we need it relative to the app module directory
        if (keystoreProperties.containsKey('storeFile')) {
            def currentStoreFile = keystoreProperties['storeFile']
            // Check if the keystore file exists relative to app dir
            def appDirStoreFile = file(currentStoreFile)
            if (!appDirStoreFile.exists()) {
                // Try relative to root project keystore/ dir
                def rootStoreFile = rootProject.file("keystore/${new File(currentStoreFile).name}")
                if (rootStoreFile.exists()) {
                    keystoreProperties.put('storeFile', rootStoreFile.absolutePath)
                }
            }
        }
    }
}

// 2. Fall back to environment variables when keystore.properties is absent
if (!keystoreProperties.containsKey('keyAlias')) {
    def envKeyAlias       = System.getenv("KEY_ALIAS")
    def envKeyPassword    = System.getenv("KEY_PASSWORD")
    def envStorePassword  = System.getenv("KEYSTORE_PASSWORD")

    if (envKeyAlias != null) {
        keystoreProperties.put('keyAlias',      envKeyAlias)
        keystoreProperties.put('keyPassword',   envKeyPassword != null ? envKeyPassword : envStorePassword)
        keystoreProperties.put('storePassword', envStorePassword)
        // Try root-level keystore dir first, then app-level
        def rootKeystore = rootProject.file("keystore/adendot-release.keystore")
        if (rootKeystore.exists()) {
            keystoreProperties.put('storeFile', rootKeystore.absolutePath)
        } else {
            keystoreProperties.put('storeFile', 'keystore/adendot-release.keystore')
        }
    }
}

// 3. If KEYSTORE_BASE64 is provided, decode it to a file and override storeFile
def keystoreBase64 = System.getenv("KEYSTORE_BASE64")
if (keystoreBase64 != null && !keystoreBase64.isEmpty()) {
    def decodedFile = new File(project.buildDir, "ci-keystore/adendot-release.keystore")
    decodedFile.parentFile.mkdirs()
    decodedFile.bytes = java.util.Base64.getDecoder().decode(keystoreBase64)
    keystoreProperties.put('storeFile', decodedFile.absolutePath)
}

android {
    namespace = "com.qtbmdev.adendot"
    compileSdk = rootProject.ext.compileSdkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    defaultConfig {
        applicationId "com.qtbmdev.adendot"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 5
        versionName "1.5.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            if (keystoreProperties.containsKey('keyAlias')) {
                keyAlias      keystoreProperties['keyAlias']
                keyPassword   keystoreProperties['keyPassword']
                storePassword keystoreProperties['storePassword']
                if (keystoreProperties['storeFile'] != null) {
                    storeFile file(keystoreProperties['storeFile'])
                }
            }
        }
    }

    buildFeatures {
        buildConfig = true
    }

    buildTypes {
        debug {
            debuggable true
            minifyEnabled false
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
        release {
            signingConfig  signingConfigs.release
            minifyEnabled  true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.biometric:biometric:1.1.0"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
