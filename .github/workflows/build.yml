name: Build AdenDot Android APKs

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.3.0)'
        required: false
        default: 'v1.3.0'

permissions:
  contents: write

# ---------------------------------------------------------------------------
# Environment variables
# ---------------------------------------------------------------------------
env:
  NEXT_PUBLIC_SUPABASE_URL: "https://zjdkfzemrosdgkgtzhtg.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqZGtmemVtcm9zZGdrZ3R6aHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNzU4NTcsImV4cCI6MjA5Njk1MTg1N30.ldIKtc8JsfSrZUHniFgAF7DZPcC-6DIMlfue_8xMPn8"
  NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqZGtmemVtcm9zZGdrZ3R6aHRnIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTM3NTg1NywiZXhwIjoyMDk2OTUxODU3fQ.gKTa_CbKLCHcgjLA_-OqGwCqHHr3dtDxZ-3Pbx-bWx4"
  SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqZGtmemVtcm9zZGdrZ3R6aHRnIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTM3NTg1NywiZXhwIjoyMDk2OTUxODU3fQ.gKTa_CbKLCHcgjLA_-OqGwCqHHr3dtDxZ-3Pbx-bWx4"
  KEYSTORE_PASSWORD: "AdenDot2026"
  KEY_ALIAS: "adendot"
  KEY_PASSWORD: "AdenDot2026"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. BUILD USER APK (>20MB)
  # ─────────────────────────────────────────────────────────────────────────
  build-user-apk:
    name: Build User APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Create .env.local
        run: |
          cat > .env.local << 'ENVEOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY=${{ env.NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL=file:./dev.db
          ENVEOF

      - name: Build Next.js static export (User mode)
        env:
          NEXT_EXPORT: "1"
        run: bun run build

      - name: Verify User output size
        run: du -sh out/

      - name: Sync Capacitor (User)
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore from KEYSTORE_BASE64 secret (if available)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding keystore from KEYSTORE_BASE64 secret..."
            mkdir -p android/app/keystore
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore/adendot-release.keystore
          else
            echo "Using keystore from repository (android/keystore/)"
          fi

      - name: Build User release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Verify User APK size
        run: ls -lh android/app/build/outputs/apk/release/app-release.apk

      - name: Rename User APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             AdenDot-User-signed.apk

      - name: Upload User APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdenDot-User-signed
          path: AdenDot-User-signed.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # 2. BUILD ADMIN APK (~10MB)
  # ─────────────────────────────────────────────────────────────────────────
  build-admin-apk:
    name: Build Admin APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Switch to Admin page
        run: |
          # Replace page.tsx with admin-page.tsx content
          cp src/app/admin-page.tsx src/app/page.tsx

          # Update capacitor.config.ts for Admin app
          cat > capacitor.config.ts << 'CAPEOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.qtbmdev.adendot.admin',
            appName: 'Aden Dot Admin',
            webDir: 'out',
            server: {
              androidScheme: 'https'
            },
            plugins: {
              SplashScreen: {
                launchShowDuration: 0,
                launchAutoHide: true,
                backgroundColor: '#FFFFFF',
                showSpinner: false,
              },
              StatusBar: {
                style: 'LIGHT',
                backgroundColor: '#FFFFFF'
              },
              LocalNotifications: {
                smallIcon: 'ic_stat_icon',
                iconColor: '#D4A853'
              },
              PushNotifications: {
                presentationOptions: ['badge', 'sound', 'alert']
              }
            }
          };

          export default config;
          CAPEOF

          # Update Android strings.xml for Admin
          cat > android/app/src/main/res/values/strings.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Aden Dot Admin</string>
              <string name="title_activity_main">Aden Dot Admin</string>
              <string name="package_name">com.qtbmdev.adendot.admin</string>
              <string name="custom_url_scheme">com.qtbmdev.adendot.admin</string>
              <string name="permission_rationale_title">الأذونات المطلوبة</string>
              <string name="permission_rationale_message">يحتاج تطبيق عدن دوت إلى هذه الأذونات</string>
              <string name="permission_settings_instruction">يمكنك تفعيل الأذونات من إعدادات التطبيق</string>
              <string name="open_settings">فتح الإعدادات</string>
              <string name="ok">حسناً</string>
              <string name="skip">تخطي</string>
              <string name="notification_channel_general">عام</string>
              <string name="notification_channel_general_desc">الإشعارات العامة</string>
              <string name="notification_channel_chat">المحادثات</string>
              <string name="notification_channel_chat_desc">رسائل المحادثة</string>
              <string name="notification_channel_live">البث المباشر</string>
              <string name="notification_channel_live_desc">إشعارات البث</string>
              <string name="notification_channel_gifts">الهدايا</string>
              <string name="notification_channel_gifts_desc">إشعارات الهدايا</string>
              <string name="biometric_prompt_title">تسجيل الدخول بالبصمة</string>
              <string name="biometric_prompt_subtitle">استخدم بصمتك للدخول</string>
              <string name="biometric_prompt_cancel">إلغاء</string>
          </resources>
          XMLEOF

          # Update Android build.gradle applicationId for Admin
          sed -i 's/applicationId "com.qtbmdev.adendot"/applicationId "com.qtbmdev.adendot.admin"/' android/app/build.gradle

          echo "✅ Switched to Admin configuration"

      - name: Create .env.local
        run: |
          cat > .env.local << 'ENVEOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY=${{ env.NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL=file:./dev.db
          NEXT_PUBLIC_APP_MODE=admin
          ENVEOF

      - name: Build Next.js static export (Admin mode)
        env:
          NEXT_EXPORT: "1"
          NEXT_PUBLIC_APP_MODE: admin
        run: bun run build

      - name: Remove heavy resources to reduce Admin APK size (~10MB)
        run: |
          cd out/
          # Remove large resource directories not needed by admin
          rm -rf heroes/        # ~7.7MB - profile heroes
          rm -rf stickers/      # ~1.9MB - chat stickers
          rm -rf animations/    # ~628KB - gift animations
          # Remove unnecessary images
          rm -f skyline-icon.png cover.png
          rm -f onboarding1.png onboarding2.png onboarding3.png
          rm -f sticker_01.png avatar.png
          echo "Cleaned admin resources"
          du -sh .

      - name: Sync Capacitor (Admin)
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore from KEYSTORE_BASE64 secret (if available)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding keystore from KEYSTORE_BASE64 secret..."
            mkdir -p android/app/keystore
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore/adendot-release.keystore
          else
            echo "Using keystore from repository (android/keystore/)"
          fi

      - name: Build Admin release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease

      - name: Verify Admin APK size
        run: ls -lh android/app/build/outputs/apk/release/app-release.apk

      - name: Rename Admin APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             AdenDot-Admin-signed.apk

      - name: Upload Admin APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdenDot-Admin-signed
          path: AdenDot-Admin-signed.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # 3. RELEASE – Create GitHub Release with both APKs
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-user-apk, build-admin-apk]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download User APK
        uses: actions/download-artifact@v4
        with:
          name: AdenDot-User-signed
          path: ./artifacts

      - name: Download Admin APK
        uses: actions/download-artifact@v4
        with:
          name: AdenDot-Admin-signed
          path: ./artifacts

      - name: List artifacts
        run: ls -lh ./artifacts/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version || 'v1.3.0' }}"
          echo "Creating release $VERSION ..."

          # Delete existing release if it exists
          gh release delete "$VERSION" --yes 2>/dev/null || true
          git tag -d "$VERSION" 2>/dev/null || true

          gh release create "$VERSION" \
            ./artifacts/AdenDot-User-signed.apk \
            ./artifacts/AdenDot-Admin-signed.apk \
            --title "AdenDot $VERSION" \
            --notes "## AdenDot $VERSION

          Built from commit \`${{ github.sha }}\`

          ### Downloads
          | File | Description |
          |------|-------------|
          | \`AdenDot-User-signed.apk\` | User version of the app |
          | \`AdenDot-Admin-signed.apk\` | Admin version of the app |

          ### How to install
          1. Download the APK that matches your role (User or Admin)
          2. Enable **Install from unknown sources** on your Android device
          3. Open the downloaded APK and follow the installation prompts

          ---
          *Auto-generated by GitHub Actions*"
