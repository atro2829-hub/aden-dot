name: Build Aden Dot APKs

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  KEYSTORE_PASSWORD: AdenDot2026
  KEY_ALIAS: adendot
  KEY_PASSWORD: AdenDot2026

jobs:
  # ========== Lint ==========
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  # ========== Build User APK ==========
  build-user-apk:
    name: Build User APK
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: oven-sh/setup-bun@v2

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: bun install --frozen-lockfile

      - name: Create env file
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.local

      - name: Build static export
        run: bun run build

      - name: Setup Capacitor
        run: |
          npx cap add android
          npx cap sync android

      - name: Add Android permissions
        run: |
          cd android
          # Update AndroidManifest.xml with all permissions
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.USE_BIOMETRIC" />
              <uses-permission android:name="android.permission.USE_FINGERPRINT" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-feature android:name="android.hardware.camera" android:required="false" />
              <uses-feature android:name="android.hardware.fingerprint" android:required="false" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Aden Dot"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme.NoActionBar"
                  android:usesCleartextTraffic="true"
                  android:networkSecurityConfig="@xml/network_security_config">
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode|navigation|density"
                      android:name=".MainActivity"
                      android:label="Aden Dot"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          MANIFEST

      - name: Generate signing key
        run: |
          cd android
          mkdir -p app/keystore
          keytool -genkeypair -v \
            -keystore app/keystore/adendot-release.keystore \
            -alias adendot \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass AdenDot2026 \
            -keypass AdenDot2026 \
            -dname "CN=QTBM DEV, OU=Development, O=QTBM DEV, L=Aden, ST=Aden, C=YE"

          # Create keystore properties
          echo "storeFile=keystore/adendot-release.keystore" > app/keystore/keystore.properties
          echo "storePassword=AdenDot2026" >> app/keystore/keystore.properties
          echo "keyAlias=adendot" >> app/keystore/keystore.properties
          echo "keyPassword=AdenDot2026" >> app/keystore/keystore.properties

      - name: Update build.gradle for signing
        run: |
          cd android
          # Add signing config to build.gradle
          sed -i '/buildTypes {/i\
          signingConfigs {\
              release {\
                  keyAlias '\''adendot'\''\
                  keyPassword '\''AdenDot2026'\''\
                  storeFile file('\''keystore/adendot-release.keystore'\'')\
                  storePassword '\''AdenDot2026'\''\
              }\
          }' app/build.gradle

          # Make release use signing config
          sed -i 's/minifyEnabled false/minifyEnabled true\n            shrinkResources true\n            signingConfig signingConfigs.release/' app/build.gradle

      - name: Generate app icons
        run: |
          cd android
          # Generate icons from the project icon
          python3 -c "
          from PIL import Image
          import os
          icon = Image.open('../public/icon.png')
          sizes = {'mipmap-mdpi': 48, 'mipmap-hdpi': 72, 'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192}
          for folder, size in sizes.items():
              d = f'app/src/main/res/{folder}'
              os.makedirs(d, exist_ok=True)
              icon.resize((size, size), Image.LANCZOS).save(f'{d}/ic_launcher.png')
              icon.resize((size, size), Image.LANCZOS).save(f'{d}/ic_launcher_round.png')
          "

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload User APK
        uses: actions/upload-artifact@v4
        with:
          name: AdenDot-User-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  # ========== Build Admin APK ==========
  build-admin-apk:
    name: Build Admin APK
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: oven-sh/setup-bun@v2

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: bun install --frozen-lockfile

      - name: Create env file (admin mode)
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.local
          echo "NEXT_PUBLIC_APP_MODE=admin" >> .env.local

      - name: Build static export
        run: bun run build

      - name: Setup Capacitor (Admin)
        run: |
          # Update capacitor config for admin
          sed -i "s/com.qtbmdev.adendot'/com.qtbmdev.adendot.admin'/" capacitor.config.ts
          sed -i 's/Aden Dot/Aden Dot Admin/' capacitor.config.ts
          npx cap add android
          npx cap sync android

      - name: Update Android package for Admin
        run: |
          cd android
          # Update package name
          sed -i 's/com.qtbmdev.adendot/com.qtbmdev.adendot.admin/g' app/src/main/AndroidManifest.xml
          sed -i 's/com.qtbmdev.adendot"/com.qtbmdev.adendot.admin"/g' app/build.gradle
          # Update app name
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">Aden Dot Admin</string><string name="title_activity_main">Aden Dot Admin</string></resources>' > app/src/main/res/values/strings.xml

      - name: Generate signing key
        run: |
          cd android
          mkdir -p app/keystore
          keytool -genkeypair -v \
            -keystore app/keystore/adendot-release.keystore \
            -alias adendot \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass AdenDot2026 \
            -keypass AdenDot2026 \
            -dname "CN=QTBM DEV, OU=Development, O=QTBM DEV, L=Aden, ST=Aden, C=YE"
          echo "storeFile=keystore/adendot-release.keystore" > app/keystore/keystore.properties
          echo "storePassword=AdenDot2026" >> app/keystore/keystore.properties
          echo "keyAlias=adendot" >> app/keystore/keystore.properties
          echo "keyPassword=AdenDot2026" >> app/keystore/keystore.properties

      - name: Update build.gradle for signing
        run: |
          cd android
          sed -i '/buildTypes {/i\
          signingConfigs {\
              release {\
                  keyAlias '\''adendot'\''\
                  keyPassword '\''AdenDot2026'\''\
                  storeFile file('\''keystore/adendot-release.keystore'\'')\
                  storePassword '\''AdenDot2026'\''\
              }\
          }' app/build.gradle
          sed -i 's/minifyEnabled false/minifyEnabled true\n            shrinkResources true\n            signingConfig signingConfigs.release/' app/build.gradle

      - name: Generate app icons
        run: |
          cd android
          python3 -c "
          from PIL import Image
          import os
          icon = Image.open('../public/icon.png')
          sizes = {'mipmap-mdpi': 48, 'mipmap-hdpi': 72, 'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192}
          for folder, size in sizes.items():
              d = f'app/src/main/res/{folder}'
              os.makedirs(d, exist_ok=True)
              icon.resize((size, size), Image.LANCZOS).save(f'{d}/ic_launcher.png')
              icon.resize((size, size), Image.LANCZOS).save(f'{d}/ic_launcher_round.png')
          "

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: AdenDot-Admin-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  # ========== Release ==========
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-user-apk, build-admin-apk]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: Rename APKs
        run: |
          find ./artifacts -name "app-release.apk" -exec sh -c 'mv "$1" "$(dirname "$1")/$(basename $(dirname $(dirname "$1"))).apk"' _ {} \;
          ls -la ./artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Aden Dot v1.0.${{ github.run_number }}"
          body: |
            # Aden Dot - عدن دوت

            ## APK Downloads
            - 📱 **AdenDot-User-APK** - تطبيق المستخدم
            - 🛡️ **AdenDot-Admin-APK** - تطبيق الأدمن

            ## Signing Info
            - **SHA1**: B8:EE:E8:A9:FA:61:CB:08:5F:16:BE:E8:04:E4:51:DD:9A:CC:B8:AD
            - **SHA256**: 67:96:A4:50:4E:14:1F:4B:BC:82:6D:7B:D0:66:AE:D3:C9:A1:AD:E5:00:D6:B1:65:87:C4:30:BC:EB:10:A4:73
            - **Package**: com.qtbmdev.adendot

            ---
            Built by QTBM DEV
          files: |
            ./artifacts/**/*.apk
