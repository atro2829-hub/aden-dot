name: Build AdenDot Android APKs

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.2.0)'
        required: false
        default: 'v1.2.0'

permissions:
  contents: write

# ---------------------------------------------------------------------------
# Environment variables – embedded for first-run convenience.
# Move these to GitHub Secrets (Settings > Secrets > Actions) for security.
# ---------------------------------------------------------------------------
env:
  # Supabase
  NEXT_PUBLIC_SUPABASE_URL: "https://ocjcbowrewenogrkexmr.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jamNib3dyZXdlbm9ncmtleG1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk3MjQzNjUsImV4cCI6MjA2NTMwMDM2NX0.RzHqKpV8vCJGjRlUQm-KjK2zKvCZqf4HGTIvuE_XnZs"
  NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jamNib3dyZXdlbm9ncmtleG1yIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc0OTcyNDM2NSwiZXhwIjoyMDY1MzAwMzY1fQ.hZOPJjSDe8FFDYOxbIf1z10HIlxbMCAHhNxZXJI5FOw"
  SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jamNib3dyZXdlbm9ncmtleG1yIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc0OTcyNDM2NSwiZXhwIjoyMDY1MzAwMzY1fQ.hZOPJjSDe8FFDYOxbIf1z10HIlxbMCAHhNxZXJI5FOw"
  # Keystore credentials (for CI env-var fallback in build.gradle)
  KEYSTORE_PASSWORD: "AdenDot2026"
  KEY_ALIAS: "adendot"
  KEY_PASSWORD: "AdenDot2026"

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. LINT
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run ESLint
        run: bun run lint

  # ─────────────────────────────────────────────────────────────────────────
  # 2. BUILD USER APK
  # ─────────────────────────────────────────────────────────────────────────
  build-user-apk:
    name: Build User APK
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Create .env.local
        run: |
          cat > .env.local << 'ENVEOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY=${{ env.NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL=file:./dev.db
          ENVEOF

      - name: Build Next.js static export (User mode)
        env:
          NEXT_EXPORT: "1"
          NEXT_PUBLIC_APP_MODE: user
        run: bun run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore from KEYSTORE_BASE64 secret (if available)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding keystore from KEYSTORE_BASE64 secret..."
            mkdir -p android/app/keystore
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore/adendot-release.keystore
          else
            echo "Using keystore from repository (android/keystore/)"
          fi

      - name: Build release APK with Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             AdenDot-User-signed.apk

      - name: Upload User APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdenDot-User-signed
          path: AdenDot-User-signed.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # 3. BUILD ADMIN APK
  # ─────────────────────────────────────────────────────────────────────────
  build-admin-apk:
    name: Build Admin APK
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Create .env.local
        run: |
          cat > .env.local << 'ENVEOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY=${{ env.NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL=file:./dev.db
          ENVEOF

      - name: Build Next.js static export (Admin mode)
        env:
          NEXT_EXPORT: "1"
          NEXT_PUBLIC_APP_MODE: admin
        run: bun run build

      - name: Sync Capacitor (update web assets in existing Android project)
        run: npx cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore from KEYSTORE_BASE64 secret (if available)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding keystore from KEYSTORE_BASE64 secret..."
            mkdir -p android/app/keystore
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore/adendot-release.keystore
          else
            echo "Using keystore from repository (android/keystore/)"
          fi

      - name: Build release APK with Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             AdenDot-Admin-signed.apk

      - name: Upload Admin APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdenDot-Admin-signed
          path: AdenDot-Admin-signed.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # 4. RELEASE – Create GitHub Release with both APKs
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-user-apk, build-admin-apk]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download User APK
        uses: actions/download-artifact@v4
        with:
          name: AdenDot-User-signed
          path: ./artifacts

      - name: Download Admin APK
        uses: actions/download-artifact@v4
        with:
          name: AdenDot-Admin-signed
          path: ./artifacts

      - name: List artifacts
        run: ls -lh ./artifacts/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version || 'v1.2.0' }}"
          echo "Creating release $VERSION ..."

          gh release create "$VERSION" \
            ./artifacts/AdenDot-User-signed.apk \
            ./artifacts/AdenDot-Admin-signed.apk \
            --title "AdenDot $VERSION" \
            --notes "## AdenDot $VERSION

          Built from commit \`${{ github.sha }}\`

          ### Downloads
          | File | Description |
          |------|-------------|
          | \`AdenDot-User-signed.apk\` | User version of the app |
          | \`AdenDot-Admin-signed.apk\` | Admin version of the app |

          ### How to install
          1. Download the APK that matches your role (User or Admin)
          2. Enable **Install from unknown sources** on your Android device
          3. Open the downloaded APK and follow the installation prompts

          ---
          *Auto-generated by GitHub Actions*"
